<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>DMYSC - Notifications</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: { green: '#16a34a', dark: '#020617' } }, fontFamily: { poppins: ['Poppins', 'sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .input-glass { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0) !important; }
        .sidebar-closed { transform: translateX(-100%); }
        @media (min-width: 768px) { .sidebar-closed { transform: translateX(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0b1121] text-slate-100 min-h-screen font-poppins overflow-hidden">

    <div class="flex h-screen relative">
        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/80 z-40 hidden md:hidden backdrop-blur-sm"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-slate-900 border-r border-slate-800 flex flex-col z-50 sidebar-closed md:relative md:translate-x-0 shadow-2xl md:shadow-none">
             <div class="p-6 flex items-center justify-between border-b border-slate-800 h-24">
                <div class="flex items-center gap-3">
                    <img src="logo.png" class="h-10 w-10 object-contain">
                    <div><h2 class="font-black text-lg text-white">ADMIN</h2><p class="text-[10px] text-brand-green font-bold">Control Panel</p></div>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden text-slate-400"><i class="ph-bold ph-x text-xl"></i></button>
            </div>
            <nav class="flex-1 p-4 space-y-2 mt-4 overflow-y-auto">
                <a href="admin_login_dashboard.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-squares-four text-xl"></i> Dashboard</a>
                <a href="member_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-users text-xl"></i> Member Manage</a>
                <a href="event_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-calendar-plus text-xl"></i> Event Manage</a>
                <a href="sport_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-trophy text-xl"></i> Sport Manage</a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 bg-brand-green text-white shadow-lg shadow-brand-green/20 rounded-xl font-bold"><i class="ph-bold ph-bell-ringing text-xl"></i> Notifications</a>
                <a href="quick_links_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-link text-xl"></i> Quick Links</a>
                <a href="excicetive_comitee_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-users-three text-xl"></i> Committee</a>
                <a href="about_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-info text-xl"></i> About Info</a>
                <a href="page_settings_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-gear text-xl"></i> Page Settings</a>
            </nav>
            <div class="p-4 border-t border-slate-800 bg-slate-900/50">
                <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white rounded-xl transition duration-300 border border-red-500/20 font-bold shadow-sm"><i class="ph-bold ph-sign-out"></i> Logout</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto relative bg-[#0b1121] custom-scrollbar">
            
            <button onclick="toggleSidebar()" class="md:hidden absolute top-6 right-6 z-40 bg-slate-800 backdrop-blur-md p-2 rounded-lg text-white border border-white/10 shadow-lg"><i class="ph-bold ph-list text-2xl"></i></button>

            <div class="relative h-80 shrink-0 overflow-hidden bg-slate-900">
                <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1579548122080-c35fd6820ecb?q=80&w=2070')] bg-cover bg-center opacity-30"></div>
                <div class="absolute inset-0 bg-gradient-to-r from-[#0b1121] via-slate-900/90 to-transparent"></div>
                <div class="absolute inset-0 bg-gradient-to-t from-[#0b1121] via-transparent to-transparent"></div>
                
                <div class="absolute bottom-24 left-6 md:left-12 z-10" data-aos="fade-right">
                    <h1 class="text-3xl md:text-5xl font-black text-white flex items-center gap-3 drop-shadow-lg">
                        <i class="ph-duotone ph-megaphone"></i> Notify Manager
                    </h1>
                    <p class="text-red-200 text-sm font-bold mt-2 opacity-90 tracking-wide uppercase">Send Alerts & News</p>
                </div>
            </div>

            <div class="max-w-7xl mx-auto px-6 md:px-12 -mt-20 relative z-10 pb-12">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    
                    <div class="lg:col-span-1">
                        <div class="glass-panel p-6 rounded-[2rem] shadow-xl sticky top-8" data-aos="fade-up">
                            <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                                <span class="bg-red-500/10 text-red-500 p-2 rounded-lg"><i class="ph-bold ph-paper-plane-right"></i></span> Compose
                            </h3>
                            <form id="notifyForm" class="space-y-4">
                                <div><label class="text-xs font-bold uppercase text-slate-500">Title</label><input type="text" id="title" required class="w-full input-glass rounded-xl p-3"></div>
                                <div><label class="text-xs font-bold uppercase text-slate-500">Message</label><textarea id="message" rows="4" required class="w-full input-glass rounded-xl p-3"></textarea></div>
                                <div>
                                    <label class="text-xs font-bold uppercase text-slate-500">Priority</label>
                                    <select id="priority" class="w-full input-glass rounded-xl p-3 bg-slate-900">
                                        <option value="normal">🔵 Normal</option>
                                        <option value="urgent">🔴 Urgent</option>
                                    </select>
                                </div>
                                <button type="submit" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3.5 rounded-xl shadow-lg transition transform hover:-translate-y-1">Publish Now</button>
                            </form>
                        </div>
                    </div>

                    <div class="lg:col-span-2">
                        <div class="glass-panel p-6 rounded-[2rem] shadow-xl" data-aos="fade-up" data-aos-delay="100">
                            <h3 class="text-sm font-bold text-slate-400 uppercase mb-6 tracking-widest flex justify-between">Sent History <button onclick="fetchNotifications()" class="text-red-500"><i class="ph-bold ph-arrows-clockwise"></i></button></h3>
                            <div id="historyList" class="space-y-4">
                                <div class="text-center py-10"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-red-500 mx-auto"></div></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/supabase.js"></script>
    <script>
        AOS.init();
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('sidebar-closed');
            sidebar.classList.toggle('sidebar-open');
            overlay.classList.toggle('hidden');
        }

        async function logout() {
            if(confirm("Logout?")) {
                await _supabase.auth.signOut();
                window.location.href = 'login.html';
            }
        }

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return window.location.href = 'login.html';
            fetchNotifications();
        }

        async function fetchNotifications() {
            const { data } = await _supabase.from('notifications').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('historyList');
            list.innerHTML = '';

            data.forEach(n => {
                const isUrgent = n.priority === 'urgent';
                const border = isUrgent ? 'border-red-500' : 'border-green-500';
                const icon = isUrgent ? 'ph-warning-circle text-red-500' : 'ph-info text-green-500';
                
                list.innerHTML += `
                    <div class="bg-slate-800 p-5 rounded-2xl shadow-sm border-l-4 ${border} relative group">
                        <div class="flex justify-between items-start gap-4">
                            <div class="flex gap-4">
                                <div class="w-10 h-10 rounded-xl bg-slate-700 flex items-center justify-center shrink-0"><i class="ph-fill ${icon} text-xl"></i></div>
                                <div>
                                    <h4 class="font-bold text-white">${n.title}</h4>
                                    <p class="text-sm text-slate-400 mt-1">${n.message}</p>
                                    <p class="text-[10px] text-slate-400 font-mono mt-2">${new Date(n.created_at).toLocaleString()}</p>
                                </div>
                            </div>
                            <button onclick="deleteNote('${n.id}')" class="text-slate-400 hover:text-red-500 p-2"><i class="ph-bold ph-trash text-lg"></i></button>
                        </div>
                    </div>`;
            });
        }

        document.getElementById('notifyForm').addEventListener('submit', async(e)=>{
            e.preventDefault();
            await _supabase.from('notifications').insert({
                title: document.getElementById('title').value,
                message: document.getElementById('message').value,
                priority: document.getElementById('priority').value
            });
            e.target.reset(); fetchNotifications();
        });

        async function deleteNote(id) { if(confirm("Delete?")) { await _supabase.from('notifications').delete().eq('id', id); fetchNotifications(); } }
        init();
    </script>
</body>
</html>
