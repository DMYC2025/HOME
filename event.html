<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>Events - DMYSC</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    colors: { brand: { green: '#16a34a', dark: '#0b1121' } }, 
                    fontFamily: { poppins: ['Poppins', 'sans-serif'] } 
                } 
            } 
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        /* Custom Calendar Styles for Dark Mode */
        .calendar-widget { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px; 
            padding: 24px; 
        }
        .cal-day { 
            width: 32px; height: 32px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 8px; font-size: 12px; margin: auto; 
            color: #94a3b8; /* slate-400 */
        }
        .cal-day:hover { background-color: rgba(255,255,255,0.05); color: white; cursor: pointer; }
        .cal-day.active { background-color: #16a34a; color: white; box-shadow: 0 0 10px rgba(22, 163, 74, 0.4); }
        .cal-day.holiday { color: #facc15; font-weight: bold; }
    </style>
</head>
<body class="bg-brand-dark min-h-screen font-poppins text-slate-100 selection:bg-brand-green selection:text-white">

    <div class="relative h-[40vh] w-full overflow-hidden flex items-center justify-center">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?q=80&w=2000')] bg-cover bg-center"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-brand-dark via-brand-dark/90 to-brand-dark/40"></div>
        
        <div class="relative z-10 text-center px-4" data-aos="fade-down">
            <h1 class="text-4xl md:text-6xl font-black text-white mb-2 uppercase tracking-tighter">
                Upcoming <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-green to-emerald-400">Events</span>
            </h1>
            <p class="text-slate-400 text-lg font-medium">Join us in our upcoming programs & activities.</p>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 md:px-6 -mt-20 relative z-20 pb-20 flex flex-col lg:flex-row gap-8">
        
        <div class="flex-1 space-y-6" id="eventFeed">
            <div class="text-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-brand-green mx-auto mb-4"></div>
                <p class="text-slate-500">Loading Events...</p>
            </div>
        </div>

        <div class="w-full lg:w-80 shrink-0 space-y-6">
            
            <div class="calendar-widget" data-aos="fade-left">
                <div class="flex justify-between items-center mb-4 border-b border-white/5 pb-4">
                    <h2 class="font-bold text-white text-lg" id="calMonth">January 2026</h2>
                    <div class="flex gap-2">
                        <button class="text-slate-500 hover:text-white transition"><i class="ph-bold ph-caret-left"></i></button>
                        <button class="text-slate-500 hover:text-white transition"><i class="ph-bold ph-caret-right"></i></button>
                    </div>
                </div>
                <div class="grid grid-cols-7 text-center mb-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                    <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
                </div>
                <div class="grid grid-cols-7 gap-y-2 text-sm font-medium" id="calGrid">
                    </div>
            </div>

            <div class="calendar-widget" data-aos="fade-left" data-aos-delay="100">
                <h3 class="text-xs font-bold text-brand-green uppercase mb-4 tracking-widest flex items-center gap-2">
                    <i class="ph-fill ph-star"></i> Special Days
                </h3>
                <div class="space-y-3">
                    <div class="flex items-center gap-3 p-3 rounded-xl bg-slate-800/50 hover:bg-slate-800 transition border border-white/5">
                        <div class="bg-slate-700 text-white font-bold text-xs p-2 rounded-lg min-w-[35px] text-center">01</div>
                        <span class="text-sm font-bold text-slate-300">New Year</span>
                    </div>
                     <div class="flex items-center gap-3 p-3 rounded-xl bg-yellow-900/20 hover:bg-yellow-900/30 transition border border-yellow-500/20">
                        <div class="bg-yellow-600 text-white font-bold text-xs p-2 rounded-lg min-w-[35px] text-center">03</div>
                        <span class="text-sm font-bold text-yellow-500">Duruthu Poya</span>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/ui.js"></script>
    <script>
        AOS.init();

        // 1. Render Calendar (Demo Logic)
        const calGrid = document.getElementById('calGrid');
        // Empty slots for start of month
        for(let i=0; i<4; i++) calGrid.innerHTML += `<div></div>`; 
        
        // Days
        for(let i=1; i<=31; i++) {
            let cls = '';
            // Example highlights
            if(i === 2) cls = 'active'; // Today
            if(i === 3) cls = 'holiday'; // Poya

            calGrid.innerHTML += `<div class="cal-day ${cls}">${i}</div>`;
        }

        // 2. Fetch Events from Supabase
        async function loadEvents() {
            const { data } = await _supabase
                .from('events')
                .select('*')
                .eq('is_hidden', false)
                .order('event_date', { ascending: true }); // Show nearest events first

            const feed = document.getElementById('eventFeed');
            feed.innerHTML = '';

            if(!data || data.length === 0) {
                 feed.innerHTML = `
                    <div class="bg-slate-800/40 backdrop-blur-md p-10 rounded-[2rem] text-center border border-white/5">
                        <div class="w-16 h-16 bg-slate-700/50 rounded-full flex items-center justify-center text-slate-500 text-3xl mx-auto mb-4">
                            <i class="ph-duotone ph-calendar-slash"></i>
                        </div>
                        <h3 class="text-xl font-bold text-white">No Upcoming Events</h3>
                        <p class="text-slate-400 mt-1">Check back later for updates.</p>
                    </div>`;
                 return;
            }

            data.forEach((ev, i) => {
                const dateObj = new Date(ev.event_date);
                const month = dateObj.toLocaleString('default', { month: 'short' }).toUpperCase();
                const day = dateObj.getDate();
                
                // Card HTML Structure
                feed.innerHTML += `
                <div class="bg-slate-800/40 backdrop-blur-md border border-white/5 rounded-[2rem] p-6 flex flex-col md:flex-row gap-6 items-center md:items-start group hover:bg-slate-800/60 hover:border-brand-green/30 transition duration-300 relative overflow-hidden shadow-xl" data-aos="fade-up" data-aos-delay="${i*100}">
                    
                    <div class="shrink-0 bg-slate-900/80 border border-slate-700 rounded-2xl p-4 text-center min-w-[80px] shadow-lg z-10">
                        <span class="block text-xs font-bold text-brand-green uppercase tracking-wider mb-1">${month}</span>
                        <span class="block text-3xl font-black text-white">${day}</span>
                    </div>
                    
                    <div class="flex-1 w-full text-center md:text-left z-10">
                        <h2 class="text-2xl font-bold text-white mb-2 group-hover:text-brand-green transition">${ev.title}</h2>
                        <p class="text-sm text-slate-400 mb-6 leading-relaxed line-clamp-2 font-light">${ev.description || 'Join us for this special event. More details coming soon.'}</p>
                        
                        <div class="flex flex-wrap justify-center md:justify-start gap-4">
                             <span class="bg-slate-900/50 px-3 py-1.5 rounded-lg text-[11px] font-bold uppercase tracking-wider text-slate-300 border border-white/5 flex items-center gap-2">
                                <i class="ph-bold ph-clock text-brand-green"></i> ${ev.event_time ? ev.event_time.slice(0,5) : 'TBA'}
                             </span>
                             <span class="bg-slate-900/50 px-3 py-1.5 rounded-lg text-[11px] font-bold uppercase tracking-wider text-slate-300 border border-white/5 flex items-center gap-2">
                                <i class="ph-fill ph-map-pin text-red-500"></i> ${ev.location || 'Horana'}
                             </span>
                        </div>
                    </div>

                    <div class="w-full md:w-48 h-48 md:h-32 rounded-2xl overflow-hidden shrink-0 bg-slate-900 relative z-10 border border-white/5">
                        <img src="${ev.image_url || 'https://via.placeholder.com/300/16a34a/ffffff?text=DMYSC'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700 opacity-90 group-hover:opacity-100">
                    </div>

                    <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-brand-green/10 rounded-full blur-3xl group-hover:bg-brand-green/20 transition duration-500"></div>
                </div>`;
            });
        }
        loadEvents();
        
    </script>
    <div id="global-footer-placeholder"></div>
<script src="js/footer-loader.js"></script>
    
    <script>
        document.getElementById('year').innerText = new Date().getFullYear();
    </script>
</body>
</html>
