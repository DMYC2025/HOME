<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMYSC - Settings & Slideshow</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: { green: '#16a34a', dark: '#020617' } }, fontFamily: { poppins: ['Poppins', 'sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .input-glass { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0) !important; }
        .sidebar-closed { transform: translateX(-100%); }
        @media (min-width: 768px) { .sidebar-closed { transform: translateX(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0b1121] text-slate-100 min-h-screen font-poppins overflow-hidden">

    <div class="flex h-screen relative">
        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/80 z-40 hidden md:hidden backdrop-blur-sm"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-slate-900 border-r border-slate-800 flex flex-col z-50 sidebar-closed md:relative md:translate-x-0 shadow-2xl md:shadow-none">
             <div class="p-6 flex items-center justify-between border-b border-slate-800 h-24">
                <div class="flex items-center gap-3">
                    <img src="logo.png" class="h-10 w-10 object-contain">
                    <div><h2 class="font-black text-lg text-white">ADMIN</h2><p class="text-[10px] text-brand-green font-bold">Control Panel</p></div>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden text-slate-400"><i class="ph-bold ph-x text-xl"></i></button>
            </div>
            <nav class="flex-1 p-4 space-y-2 mt-4 overflow-y-auto">
                <a href="admin_login_dashboard.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-squares-four text-xl"></i> Dashboard</a>
                <a href="member_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-users text-xl"></i> Member Manage</a>
                <a href="event_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-calendar-plus text-xl"></i> Event Manage</a>
                <a href="sport_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-trophy text-xl"></i> Sport Manage</a>
                <a href="notifycation_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-bell-ringing text-xl"></i> Notifications</a>
                <a href="quick_links_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-link text-xl"></i> Quick Links</a>
                <a href="excicetive_comitee_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-users-three text-xl"></i> Committee</a>
                <a href="about_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-info text-xl"></i> About Info</a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 bg-brand-green text-white shadow-lg shadow-brand-green/20 rounded-xl font-bold"><i class="ph-bold ph-gear text-xl"></i> Page Settings</a>
            </nav>
            <div class="p-4 border-t border-slate-800 bg-slate-900/50">
                <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white rounded-xl transition duration-300 border border-red-500/20 font-bold shadow-sm"><i class="ph-bold ph-sign-out"></i> Logout</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto relative bg-[#0b1121] custom-scrollbar">
            <button onclick="toggleSidebar()" class="md:hidden absolute top-6 right-6 z-40 bg-slate-800 backdrop-blur-md p-2 rounded-lg text-white border border-white/10 shadow-lg"><i class="ph-bold ph-list text-2xl"></i></button>

            <div class="relative h-80 shrink-0 overflow-hidden bg-slate-900">
                <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?q=80&w=2072')] bg-cover bg-center opacity-30"></div>
                <div class="absolute inset-0 bg-gradient-to-r from-[#0b1121] via-slate-900/90 to-transparent"></div>
                <div class="absolute inset-0 bg-gradient-to-t from-[#0b1121] via-transparent to-transparent"></div>
                
                <div class="absolute bottom-24 left-6 md:left-12 z-10" data-aos="fade-right">
                    <h1 class="text-3xl md:text-5xl font-black text-white flex items-center gap-3 drop-shadow-lg">
                        <i class="ph-duotone ph-gear"></i> Page Settings
                    </h1>
                    <p class="text-slate-300 text-sm font-bold mt-2 opacity-90 tracking-wide uppercase">Manage Footer & Background Slideshow</p>
                </div>
            </div>

            <div class="max-w-4xl mx-auto px-6 md:px-12 -mt-20 relative z-10 pb-12 space-y-8">
                
                <div class="glass-panel p-8 rounded-[2rem] shadow-xl border border-slate-800" data-aos="fade-up">
                    <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                        <i class="ph-fill ph-address-book text-brand-green"></i> Contact Information
                    </h3>
                    <form id="settingsForm" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Phone</label>
                                <input type="text" id="phone" class="w-full input-glass rounded-xl p-3">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Email</label>
                                <input type="email" id="email" class="w-full input-glass rounded-xl p-3">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Address</label>
                            <textarea id="address" rows="3" class="w-full input-glass rounded-xl p-3"></textarea>
                        </div>
                        <button type="submit" class="bg-brand-green text-white font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-green-600 transition flex items-center gap-2">
                            <i class="ph-bold ph-floppy-disk"></i> Update Footer Info
                        </button>
                    </form>
                </div>

                <div class="glass-panel p-8 rounded-[2rem] shadow-xl border border-slate-800" data-aos="fade-up" data-aos-delay="100">
                    <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                        <i class="ph-fill ph-images text-blue-400"></i> Hero Slideshow Images
                    </h3>
                    
                    <div class="bg-slate-800/50 p-6 rounded-2xl border border-white/5 mb-8">
                        <h4 class="text-sm font-bold text-slate-300 uppercase mb-4">Add New Slide</h4>
                        
                        <div class="flex gap-4 mb-4">
                            <button onclick="setInputType('link')" id="btnLink" class="bg-brand-green text-white px-4 py-2 rounded-lg text-xs font-bold">Link URL</button>
                            <button onclick="setInputType('file')" id="btnFile" class="bg-slate-700 text-slate-400 px-4 py-2 rounded-lg text-xs font-bold">Upload File</button>
                        </div>

                        <form id="addSlideForm" class="flex flex-col md:flex-row gap-4 items-end">
                            <div class="flex-1 w-full" id="inputContainer">
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Image URL</label>
                                <input type="text" id="slideUrl" placeholder="https://..." class="w-full input-glass rounded-xl p-3 text-sm">
                            </div>
                            <input type="file" id="slideFile" class="hidden w-full text-slate-400 text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-brand-green file:text-white hover:file:bg-green-600">
                            
                            <button type="submit" id="addBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl transition flex items-center gap-2 shrink-0">
                                <i class="ph-bold ph-plus"></i> Add Slide
                            </button>
                        </form>
                    </div>

                    <div class="overflow-hidden rounded-xl border border-slate-700">
                        <table class="w-full text-left text-sm text-slate-400">
                            <thead class="bg-slate-800 text-xs uppercase font-bold text-slate-200">
                                <tr>
                                    <th class="p-4 w-20">Preview</th>
                                    <th class="p-4">Link / Source</th>
                                    <th class="p-4 text-center w-32">Order</th>
                                    <th class="p-4 text-right w-20">Action</th>
                                </tr>
                            </thead>
                            <tbody id="slideTable" class="divide-y divide-slate-700 bg-slate-900/50">
                                </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/supabase.js"></script>
    <script>
        AOS.init();
        
        // Sidebar Logic
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('sidebar-closed');
            sidebar.classList.toggle('sidebar-open');
            overlay.classList.toggle('hidden');
        }

        async function logout() {
            if(confirm("Logout?")) {
                await _supabase.auth.signOut();
                window.location.href = 'login.html';
            }
        }

        // --- 1. Footer Contact Info Logic ---
        async function loadSettings() {
            const { data } = await _supabase.from('site_settings').select('*').eq('id', 1).single();
            if (data) {
                document.getElementById('address').value = data.address || '';
                document.getElementById('phone').value = data.phone || '';
                document.getElementById('email').value = data.email || '';
            }
        }
        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await _supabase.from('site_settings').update({
                address: document.getElementById('address').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value
            }).eq('id', 1);
            if(error) alert(error.message); else alert('Settings Updated!');
        });


        // --- 2. Slideshow Management Logic ---
        let currentInputType = 'link';
        let slidesData = [];

        function setInputType(type) {
            currentInputType = type;
            const container = document.getElementById('inputContainer');
            const urlInput = document.getElementById('slideUrl');
            const fileInput = document.getElementById('slideFile');
            const btnLink = document.getElementById('btnLink');
            const btnFile = document.getElementById('btnFile');

            if (type === 'link') {
                urlInput.classList.remove('hidden');
                fileInput.classList.add('hidden');
                container.innerHTML = `<label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Image URL</label><input type="text" id="slideUrl" placeholder="https://..." class="w-full input-glass rounded-xl p-3 text-sm">`;
                
                btnLink.classList.replace('bg-slate-700', 'bg-brand-green');
                btnLink.classList.replace('text-slate-400', 'text-white');
                btnFile.classList.replace('bg-brand-green', 'bg-slate-700');
                btnFile.classList.replace('text-white', 'text-slate-400');
            } else {
                container.innerHTML = `<label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Select Image File</label><input type="file" id="slideFile" class="w-full text-slate-400 text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-brand-green file:text-white hover:file:bg-green-600">`;
                
                btnFile.classList.replace('bg-slate-700', 'bg-brand-green');
                btnFile.classList.replace('text-slate-400', 'text-white');
                btnLink.classList.replace('bg-brand-green', 'bg-slate-700');
                btnLink.classList.replace('text-white', 'text-slate-400');
            }
        }

        async function fetchSlides() {
            const { data, error } = await _supabase
                .from('hero_slides')
                .select('*')
                .order('order_index', { ascending: true });
            
            if (!error) {
                slidesData = data;
                renderSlides(data);
            }
        }

        function renderSlides(slides) {
            const tbody = document.getElementById('slideTable');
            tbody.innerHTML = '';
            
            if(slides.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-xs">No slides added yet.</td></tr>`;
                return;
            }

            slides.forEach((slide, index) => {
                tbody.innerHTML += `
                <tr class="hover:bg-slate-800 transition group">
                    <td class="p-4"><img src="${slide.image_url}" class="w-12 h-8 object-cover rounded border border-slate-600"></td>
                    <td class="p-4 text-xs font-mono truncate max-w-[200px] text-slate-500">${slide.image_url}</td>
                    <td class="p-4 text-center">
                        <div class="flex items-center justify-center gap-1">
                            <button onclick="moveSlide('${slide.id}', 'up', ${index})" class="p-1 hover:text-white ${index === 0 ? 'opacity-20 cursor-not-allowed' : 'text-blue-400'}"><i class="ph-bold ph-caret-up"></i></button>
                            <button onclick="moveSlide('${slide.id}', 'down', ${index})" class="p-1 hover:text-white ${index === slides.length - 1 ? 'opacity-20 cursor-not-allowed' : 'text-blue-400'}"><i class="ph-bold ph-caret-down"></i></button>
                        </div>
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="deleteSlide('${slide.id}')" class="text-red-500 hover:text-white bg-red-500/10 hover:bg-red-500 p-2 rounded-lg transition"><i class="ph-bold ph-trash"></i></button>
                    </td>
                </tr>`;
            });
        }

        // Add Slide Logic
        document.getElementById('addSlideForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('addBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin"></i> Saving...';
            btn.disabled = true;

            try {
                let imageUrl = '';

                if (currentInputType === 'file') {
                    const fileInput = document.getElementById('slideFile');
                    if (!fileInput.files || fileInput.files.length === 0) { alert("Please select a file!"); throw new Error("No File"); }
                    
                    const file = fileInput.files[0];
                    const fileName = `slide_${Date.now()}_${file.name}`;
                    
                    // Upload to 'slides' bucket
                    const { data, error } = await _supabase.storage.from('slides').upload(fileName, file);
                    if (error) throw error;

                    // Get Public URL
                    const { data: { publicUrl } } = _supabase.storage.from('slides').getPublicUrl(fileName);
                    imageUrl = publicUrl;
                } else {
                    imageUrl = document.getElementById('slideUrl').value;
                    if (!imageUrl) { alert("Please enter a URL!"); throw new Error("No URL"); }
                }

                // Insert to DB
                // Calculate new order_index (max + 1)
                const newIndex = slidesData.length > 0 ? Math.max(...slidesData.map(s => s.order_index)) + 1 : 0;
                
                const { error: dbError } = await _supabase.from('hero_slides').insert([{ image_url: imageUrl, order_index: newIndex }]);
                
                if (dbError) throw dbError;

                alert("Slide Added Successfully!");
                e.target.reset();
                fetchSlides();

            } catch (err) {
                if(err.message !== "No File" && err.message !== "No URL") alert("Error: " + err.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // Delete Logic
        async function deleteSlide(id) {
            if(confirm("Are you sure you want to delete this slide?")) {
                const { error } = await _supabase.from('hero_slides').delete().eq('id', id);
                if(error) alert(error.message);
                else fetchSlides();
            }
        }

        // Re-Order Logic
        async function moveSlide(id, direction, currentIndex) {
            if (direction === 'up' && currentIndex === 0) return;
            if (direction === 'down' && currentIndex === slidesData.length - 1) return;

            const targetIndex = direction === 'up' ? currentIndex - 1 : currentIndex + 1;
            const currentItem = slidesData[currentIndex];
            const targetItem = slidesData[targetIndex];

            // Swap order_index values
            try {
                // Update current item to target's index
                await _supabase.from('hero_slides').update({ order_index: targetItem.order_index }).eq('id', currentItem.id);
                // Update target item to current's old index
                await _supabase.from('hero_slides').update({ order_index: currentItem.order_index }).eq('id', targetItem.id);
                
                fetchSlides();
            } catch (err) { console.error(err); }
        }

        // Init
        loadSettings();
        fetchSlides();

    </script>
</body>
</html>
