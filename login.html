<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>Login - DMYSC</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: { green: '#16a34a', dark: '#0b1121' } }, fontFamily: { poppins: ['Poppins', 'sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-brand-dark min-h-screen flex items-center justify-center p-4 overflow-hidden relative font-poppins">

    <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1541534741688-6078c6bfb5c5?q=80&w=2069')] bg-cover bg-center opacity-20"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-brand-dark via-brand-dark/90 to-brand-dark/60"></div>

    <div class="bg-slate-900/60 backdrop-blur-xl border border-white/10 shadow-[0_0_50px_rgba(0,0,0,0.5)] rounded-3xl w-full max-w-md overflow-hidden relative z-10 p-8">
        
        <div class="text-center mb-8">
            <img src="logo.png" class="h-20 w-auto mx-auto mb-4 drop-shadow-[0_0_15px_rgba(22,163,74,0.6)]">
            <h2 class="text-3xl font-black text-white tracking-tight uppercase">Welcome Back</h2>
            <p class="text-brand-green font-bold text-sm tracking-widest uppercase">Dream Makers Youth & Sports Club</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div class="space-y-1">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Email Address</label>
                <div class="relative group">
                    <i class="ph-bold ph-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-brand-green transition"></i>
                    <input type="email" id="email" required class="w-full pl-12 pr-4 py-4 rounded-xl bg-slate-800/50 border border-slate-700 text-white placeholder-slate-600 focus:border-brand-green focus:ring-1 focus:ring-brand-green outline-none transition" placeholder="member@example.com">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Password</label>
                <div class="relative group">
                    <i class="ph-bold ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-brand-green transition"></i>
                    <input type="password" id="password" required class="w-full pl-12 pr-4 py-4 rounded-xl bg-slate-800/50 border border-slate-700 text-white placeholder-slate-600 focus:border-brand-green focus:ring-1 focus:ring-brand-green outline-none transition" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="loginBtn" class="w-full bg-brand-green hover:bg-green-500 text-white py-4 rounded-xl font-bold shadow-[0_0_20px_rgba(22,163,74,0.4)] hover:shadow-[0_0_30px_rgba(22,163,74,0.6)] transition transform hover:-translate-y-1 flex justify-center items-center gap-2">
                <i class="ph-bold ph-sign-in"></i> Login
            </button>
            
            <p id="statusMsg" class="text-center text-sm font-bold mt-4 hidden text-red-400 bg-red-900/20 p-2 rounded-lg"></p>
        </form>
        
        <div class="mt-8 text-center pt-6 border-t border-white/5">
            <p class="text-sm text-slate-400">Don't have an account? <a href="reg.html" class="text-brand-green font-bold hover:text-white transition">Register Now</a></p>
        </div>
    </div>

    <script src="js/supabase.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const statusMsg = document.getElementById('statusMsg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="ph-bold ph-spinner animate-spin"></i> Checking...';
            statusMsg.classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data: authData, error: authError } = await _supabase.auth.signInWithPassword({ email, password });
                if (authError) throw authError;

                const { data: profileData, error: profileError } = await _supabase.from('profiles').select('full_name, avatar_url, is_approved, role').eq('id', authData.user.id).single();
                
                if (profileData && profileData.is_approved) {
                    // Save to LocalStorage for UI.js to use immediately
                    localStorage.setItem('userName', profileData.full_name);
                    localStorage.setItem('userAvatar', profileData.avatar_url || 'https://via.placeholder.com/150');
                    
                    window.location.href = 'user_dashboard.html';
                } else {
                    await _supabase.auth.signOut();
                    throw new Error("Account pending approval.");
                }
            } catch (error) {
                statusMsg.textContent = error.message;
                statusMsg.classList.remove('hidden');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="ph-bold ph-sign-in"></i> Login';
            }
        });
    </script>
</body>
</html>
