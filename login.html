<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMYSC - Login</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: { green: '#16a34a', dark: '#020617' } }, fontFamily: { poppins: ['Poppins', 'sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 dark:bg-brand-dark min-h-screen flex items-center justify-center p-4 relative overflow-hidden transition-colors duration-500 font-poppins">

    <!-- Background Decoration -->
    <div class="absolute top-0 left-0 w-96 h-96 bg-brand-green/20 rounded-full blur-[100px] animate-pulse"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-blue-600/20 rounded-full blur-[100px] animate-pulse"></div>

    <!-- Theme Toggle -->
    <button onclick="toggleTheme()" class="absolute top-6 right-6 w-10 h-10 rounded-full bg-white dark:bg-slate-800 shadow-lg flex items-center justify-center text-slate-600 dark:text-white z-50">
        <i class="ph-bold ph-moon dark:hidden"></i><i class="ph-bold ph-sun hidden dark:inline"></i>
    </button>

    <div class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border border-white/20 dark:border-slate-700 shadow-2xl rounded-3xl w-full max-w-md overflow-hidden relative z-10">
        
        <div class="h-32 bg-gradient-to-br from-brand-green to-emerald-700 p-8 flex items-end">
            <div>
                <h2 class="text-3xl font-black text-white">Member Login</h2>
                <p class="text-green-100 text-sm">Welcome Back!</p>
            </div>
            <img src="logo.png" class="absolute top-6 right-6 h-16 w-16 opacity-50 drop-shadow-md">
        </div>

        <div class="p-8">
            <form id="loginForm" class="space-y-6">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">Email Address</label>
                    <div class="relative">
                        <i class="ph-bold ph-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="email" id="email" required class="w-full pl-12 pr-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 focus:border-brand-green dark:focus:border-brand-green outline-none dark:text-white transition font-medium" placeholder="you@example.com">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">Password</label>
                    <div class="relative">
                        <i class="ph-bold ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="password" id="password" required class="w-full pl-12 pr-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 focus:border-brand-green dark:focus:border-brand-green outline-none dark:text-white transition font-medium" placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="w-full bg-brand-green text-white py-4 rounded-xl font-bold shadow-lg shadow-green-500/30 hover:bg-green-600 hover:-translate-y-1 transition transform flex justify-center items-center gap-2">
                    <i class="ph-bold ph-sign-in"></i> Login
                </button>

                <p id="statusMsg" class="text-center text-sm font-bold mt-2 hidden"></p>

                <div class="flex items-center gap-4 my-4">
                    <div class="flex-1 h-px bg-slate-200 dark:bg-slate-700"></div>
                    <span class="text-xs text-slate-400 font-bold">OR</span>
                    <div class="flex-1 h-px bg-slate-200 dark:bg-slate-700"></div>
                </div>

                <button onclick="signInWithGoogle()" type="button" class="w-full py-3.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition flex items-center justify-center gap-2">
    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="h-5 w-5" alt="Google">
    <span>Login with Google</span>
</button>

<script>
    async function signInWithGoogle() {
    try {
        const { data, error } = await _supabase.auth.signInWithOAuth({
            provider: 'google',
            options: {
                // කෙලින්ම Dashboard එකට නොයවා, පරීක්ෂා කිරීම සඳහා නැවත මෙම පිටුවටම ගෙන්වා ගනී
                redirectTo: window.location.href 
            }
        });
        if (error) throw error;
    } catch (error) {
        alert("Google Login Error: " + error.message);
    }
}
</script>
            </form>
            
            <div class="mt-8 text-center">
                <p class="text-sm text-slate-500 dark:text-slate-400">Don't have an account? <a href="reg.html" class="text-brand-green font-bold hover:underline">Register</a></p>
                <a href="index.html" class="mt-4 inline-block text-xs text-slate-400 hover:text-brand-green transition">Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');

        const supabaseUrl = 'https://tnrqasiiywcvtwkwytqe.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRucnFhc2lpeXdjdnR3a3d5dHFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjczNDIxMTEsImV4cCI6MjA4MjkxODExMX0.rd9aKmLa687zMxg8FV5AllgnYkz7wpdXBRi3a5NyXc4';
        const _supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const statusMsg = document.getElementById('statusMsg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="ph-bold ph-spinner animate-spin"></i> Checking...';
            statusMsg.classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data: authData, error: authError } = await _supabase.auth.signInWithPassword({ email, password });
                if (authError) throw authError;

                const { data: profileData, error: profileError } = await _supabase.from('profiles').select('is_approved, role').eq('id', authData.user.id).single();
                if (profileError) throw new Error("Error fetching user data.");

                if (profileData.is_approved === true) {
                    statusMsg.textContent = "Success! Logging in...";
                    statusMsg.className = "text-center text-sm font-bold mt-2 text-green-500 block";
                    setTimeout(() => {
                        window.location.href = profileData.role === 'admin' ? 'admin_login_dashboard.html' : 'user_dashboard.html';
                    }, 1000);
                } else {
                    await _supabase.auth.signOut();
                    alert("Your account has not been approved by Admin yet.");
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="ph-bold ph-sign-in"></i> Login';
                }
            } catch (error) {
                statusMsg.textContent = "Error: " + (error.message === "Invalid login credentials" ? "Invalid Email or Password." : error.message);
                statusMsg.className = "text-center text-sm font-bold mt-2 text-red-500 block";
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="ph-bold ph-sign-in"></i> Login';
            }
        });
        // Google Login හරහා හෝ Refresh කිරීමේදී Session එකක් ඇත්දැයි පරීක්ෂා කරයි
_supabase.auth.onAuthStateChange(async (event, session) => {
    if (session) {
        // User Login වී ඇත. දැන් System එකේ Profile එකක් තිබේදැයි බලමු.
        const { data: profile, error } = await _supabase
            .from('profiles')
            .select('id, is_approved, role')
            .eq('id', session.user.id)
            .single();

        // Profile එකක් හමු නොවුණි නම් (එනම් Register නොවී Google වලින් ආපු කෙනෙක්)
        if (!profile) {
            await _supabase.auth.signOut(); // වහාම Log out කරයි
            alert("මෙම Google ගිණුම අපගේ පද්ධතියේ ලියාපදිංචි වී නොමැත. කරුණාකර පළමුව 'Register' පිටුවෙන් ලියාපදිංචි වන්න.");
        } 
        else {
            // Profile එක තිබේ. දැන් Approve වී ඇත්දැයි බලමු.
            if (profile.is_approved === true) {
                // සාර්ථකයි නම් අදාළ Dashboard එකට යවන්න
                window.location.href = profile.role === 'admin' ? 'admin_login_dashboard.html' : 'user_dashboard.html';
            } else {
                await _supabase.auth.signOut();
                alert("ඔබගේ ගිණුම තවම Admin විසින් අනුමත කර නොමැත. (Account Approval Pending)");
            }
        }
    }
});
    </script>
</body>
</html>
