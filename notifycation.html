<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - DMYSC</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    colors: { brand: { green: '#16a34a', dark: '#0b1121' } },
                    fontFamily: { poppins: ['Poppins', 'sans-serif'] } 
                } 
            } 
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-brand-dark dark:text-slate-100 min-h-screen font-poppins transition-colors duration-300">

    <div class="relative h-[40vh] w-full overflow-hidden flex items-center justify-center">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1579548122080-c35fd6820ecb?q=80&w=2070')] bg-cover bg-center"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-brand-dark via-brand-dark/90 to-brand-dark/50"></div>
        
        <div class="relative z-10 text-center px-4" data-aos="fade-down">
            <h1 class="text-4xl md:text-6xl font-black text-white mb-2 uppercase tracking-tighter">
                Club <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-green to-yellow-400">Alerts</span>
            </h1>
            <p class="text-slate-400 text-lg font-medium">Stay updated with the latest news and announcements.</p>
        </div>
    </div>

    <main class="max-w-4xl mx-auto px-4 -mt-20 relative z-20 pb-20">
        <div id="notificationFeed" class="space-y-6">
            <div class="text-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-brand-green mx-auto mb-4"></div>
                <p class="text-slate-500">Loading Notifications...</p>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/ui.js"></script>
    <script>
        AOS.init();

        async function fetchNotifications() {
            const { data, error } = await _supabase
                .from('notifications')
                .select('*')
                .order('created_at', { ascending: false });

            const feed = document.getElementById('notificationFeed');
            feed.innerHTML = '';

            if (!data || data.length === 0) {
                feed.innerHTML = `
                    <div class="bg-slate-800/50 backdrop-blur-md p-10 rounded-[2rem] text-center border border-white/5">
                        <div class="w-20 h-20 bg-slate-700/50 rounded-full flex items-center justify-center text-slate-500 text-3xl mx-auto mb-4">
                            <i class="ph-duotone ph-bell-slash"></i>
                        </div>
                        <h3 class="text-xl font-bold text-white">No New Alerts</h3>
                        <p class="text-slate-400">You are all caught up!</p>
                    </div>
                `;
                return;
            }

            data.forEach((n, index) => {
                const isUrgent = n.priority === 'urgent';
                
                // Styling based on priority
                const cardBg = isUrgent ? 'bg-red-900/10 border-red-500/30' : 'bg-slate-800/60 border-slate-700/50';
                const iconBg = isUrgent ? 'bg-red-500 text-white' : 'bg-brand-green text-white';
                const icon = isUrgent ? 'ph-warning-circle' : 'ph-info';
                const date = new Date(n.created_at).toLocaleString();

                const item = `
                    <div class="${cardBg} backdrop-blur-xl p-6 rounded-[2rem] border shadow-lg hover:transform hover:-translate-y-1 transition duration-300 relative overflow-hidden group" data-aos="fade-up" data-aos-delay="${index * 100}">
                        ${isUrgent ? '<div class="absolute top-0 right-0 bg-red-600 text-white text-[10px] px-4 py-1 font-black uppercase rounded-bl-xl shadow-lg z-10">Urgent</div>' : ''}
                        
                        <div class="flex gap-5 items-start relative z-10">
                            <div class="shrink-0">
                                <div class="w-14 h-14 rounded-2xl ${iconBg} flex items-center justify-center shadow-lg shadow-${isUrgent ? 'red' : 'green'}-500/20">
                                    <i class="ph-fill ${icon} text-2xl"></i>
                                </div>
                            </div>
                            <div class="flex-1 pt-1">
                                <h3 class="text-xl font-bold text-white mb-2 leading-tight">${n.title}</h3>
                                <p class="text-slate-400 text-sm leading-relaxed mb-4 font-light">${n.message}</p>
                                <div class="flex items-center gap-2 text-xs font-bold text-slate-500 uppercase tracking-widest">
                                    <i class="ph-bold ph-clock"></i> ${date}
                                </div>
                            </div>
                        </div>
                        
                        <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-white/5 rounded-full blur-2xl group-hover:bg-white/10 transition duration-500"></div>
                    </div>
                `;
                feed.insertAdjacentHTML('beforeend', item);
            });
        }

        fetchNotifications();
    </script>
    <div id="global-footer-placeholder"></div>
<script src="js/footer-loader.js"></script>
    
    <script>
        document.getElementById('year').innerText = new Date().getFullYear();
    </script>
</body>
</html>
