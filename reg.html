<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - DMYSC</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    colors: { brand: { green: '#16a34a', dark: '#0b1121' } }, 
                    fontFamily: { poppins: ['Poppins', 'sans-serif'] } 
                } 
            } 
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body class="bg-brand-dark min-h-screen flex items-center justify-center p-4 font-poppins overflow-x-hidden relative">

    <!-- Background Layer (Consistent with Login) -->
    <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1517649763962-0c623066013b?q=80&w=2070')] bg-cover bg-center opacity-20 fixed"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-brand-dark via-brand-dark/90 to-brand-dark/60 fixed"></div>
    
    <!-- Ambient Blobs -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-brand-green/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- Registration Card -->
    <div class="relative z-10 w-full max-w-4xl" data-aos="fade-up" data-aos-duration="800">
        
        <div class="text-center mb-8" data-aos="fade-down" data-aos-delay="100">
            <a href="index.html" class="inline-block relative group">
                <div class="absolute inset-0 bg-brand-green/30 rounded-full blur-md group-hover:bg-brand-green/50 transition"></div>
                <img src="logo.png" class="h-20 w-auto relative z-10 drop-shadow-[0_0_15px_rgba(22,163,74,0.6)]">
            </a>
            <h2 class="text-4xl font-black text-white tracking-tight uppercase mt-4">Join The Club</h2>
            <p class="text-brand-green font-bold text-sm tracking-[0.2em] uppercase">Dream Makers Youth & Sports Club</p>
        </div>

        <div class="bg-slate-900/60 backdrop-blur-xl border border-white/10 shadow-[0_0_50px_rgba(0,0,0,0.5)] rounded-[2.5rem] overflow-hidden p-8 md:p-12 relative">
            
            <!-- Glow Effect inside card -->
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-transparent via-brand-green to-transparent opacity-50"></div>

            <form id="regForm" class="space-y-8">
                
                <!-- Section 1: Personal Info -->
                <div class="space-y-6">
                    <h3 class="text-white font-bold text-lg flex items-center gap-2 border-b border-white/10 pb-2">
                        <i class="ph-fill ph-user text-brand-green"></i> Personal Details
                    </h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Full Name -->
                        <div class="md:col-span-2 group">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Name with Initials</label>
                            <div class="relative">
                                <i class="ph-bold ph-identification-badge absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-brand-green transition"></i>
                                <input type="text" id="fullName" required placeholder="e.g. A.B. Perera" class="w-full pl-12 pr-4 py-4 rounded-xl bg-slate-800/50 border border-slate-700 text-white placeholder-slate-600 focus:border-brand-green focus:ring-1 focus:ring-brand-green outline-none transition font-medium">
                            </div>
                        </div>

                        <!-- DOB -->
                        <div class="group">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Date of Birth</label>
                            <div class="relative">
                                <i class="ph-bold ph-calendar-blank absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-brand-green transition"></i>
                                <input type="date" id="dob" required class="w-full pl-12 pr-4 py-4 rounded-xl bg-slate-800/50 border border-slate-700 text-white placeholder-slate-600 focus:border-brand-green focus:ring-1 focus:ring-brand-green outline-none transition font-medium text-slate-400 focus:text-white">
                            </div>
                        </div>

                        <!-- NIC -->
                        <div class="group">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">NIC Number</label>
                            <div class="relative">
                                <i class="ph-bold ph-cardholder absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-brand-green transition"></i>
                                <input type="text" id="nic" required placeholder="NIC No" class="w-full pl-12 pr-4 py-4 rounded-xl bg-slate-800/50 border border-slate-700 text-white placeholder-slate-600 focus:border-brand-green focus:ring-1 focus:ring-brand-green outline-none transition font-medium">
                            </div>
                        </div>

                         <!-- Gender -->
                         <div class="group">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Gender</label>
                            <div class="relative">
                                <i class="ph-bold ph-gender-intersex absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-brand-green transition"></i>
                                <select id="gender" required class="w-full pl-12 pr-4 py-4 rounded-xl bg-slate-800/50 border border-slate-700 text-white focus:border-brand-green focus:ring-1 focus:ring-brand-green outline-none transition font-medium appearance-none">
                                    <option value="" class="bg-slate-900 text-slate-500">Select Gender</option>
                                    <option value="Male" class="bg-slate-900">Male</option>
                                    <option value="Female" class="bg-slate-900">Female</option>
                                </select>
                            </div>
                        </div>

                         <!-- Phone -->
                         <div class="group">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">WhatsApp Number</label>
                            <div class="relative">
                                <i class="ph-bold ph-whatsapp-logo absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-brand-green transition"></i>
                                <input type="tel" id="phone" required placeholder="07x xxxxxxx" class="w-full pl-12 pr-4 py-4 rounded-xl bg-slate-800/50 border border-slate-700 text-white placeholder-slate-600 focus:border-brand-green focus:ring-1 focus:ring-brand-green outline-none transition font-medium">
                            </div>
                        </div>

                        <!-- Address -->
                        <div class="md:col-span-2 group">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Residential Address</label>
                            <div class="relative">
                                <i class="ph-bold ph-map-pin absolute left-4 top-4 text-slate-500 group-focus-within:text-brand-green transition"></i>
                                <textarea id="address" rows="2" required placeholder="No, Street, City..." class="w-full pl-12 pr-4 py-4 rounded-xl bg-slate-800/50 border border-slate-700 text-white placeholder-slate-600 focus:border-brand-green focus:ring-1 focus:ring-brand-green outline-none transition font-medium"></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section 2: Account Security -->
                <div class="space-y-6">
                    <h3 class="text-white font-bold text-lg flex items-center gap-2 border-b border-white/10 pb-2">
                        <i class="ph-fill ph-lock-key text-brand-green"></i> Account Security
                    </h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Email -->
                        <div class="group">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Email Address</label>
                            <div class="relative">
                                <i class="ph-bold ph-envelope-simple absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-brand-green transition"></i>
                                <input type="email" id="email" required placeholder="you@example.com" class="w-full pl-12 pr-4 py-4 rounded-xl bg-slate-800/50 border border-slate-700 text-white placeholder-slate-600 focus:border-brand-green focus:ring-1 focus:ring-brand-green outline-none transition font-medium">
                            </div>
                            <p class="text-[10px] text-slate-500 mt-1 ml-1">* Used for login & notifications</p>
                        </div>

                        <!-- Password -->
                        <div class="group">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Password</label>
                            <div class="relative">
                                <i class="ph-bold ph-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-brand-green transition"></i>
                                <input type="password" id="password" required minlength="6" placeholder="••••••••" class="w-full pl-12 pr-4 py-4 rounded-xl bg-slate-800/50 border border-slate-700 text-white placeholder-slate-600 focus:border-brand-green focus:ring-1 focus:ring-brand-green outline-none transition font-medium">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-brand-green to-emerald-600 text-white font-black uppercase tracking-wider py-4 rounded-xl shadow-[0_0_20px_rgba(22,163,74,0.4)] hover:shadow-[0_0_35px_rgba(22,163,74,0.6)] hover:from-brand-green hover:to-emerald-500 transition transform hover:-translate-y-1 flex justify-center items-center gap-2">
                        <i class="ph-bold ph-paper-plane-right text-xl"></i> Submit Registration
                    </button>
                    <p id="loadingText" class="text-center text-brand-green text-sm font-bold mt-4 hidden animate-pulse">
                        <i class="ph-bold ph-spinner animate-spin"></i> Processing...
                    </p>
                </div>
            </form>
            
            <div class="mt-8 text-center pt-6 border-t border-white/5">
                <a href="index.html" class="text-sm text-slate-400 hover:text-white transition font-bold flex items-center justify-center gap-2">
                    <i class="ph-bold ph-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        const supabaseUrl = 'https://tnrqasiiywcvtwkwytqe.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRucnFhc2lpeXdjdnR3a3d5dHFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjczNDIxMTEsImV4cCI6MjA4MjkxODExMX0.rd9aKmLa687zMxg8FV5AllgnYkz7wpdXBRi3a5NyXc4';
        const _supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const regForm = document.getElementById('regForm');
        const submitBtn = document.getElementById('submitBtn');
        const loadingText = document.getElementById('loadingText');

        regForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            submitBtn.innerHTML = '<i class="ph-bold ph-lock-key"></i> Submitting...';
            loadingText.classList.remove('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const metaData = {
                full_name: document.getElementById('fullName').value,
                dob: document.getElementById('dob').value,
                nic: document.getElementById('nic').value,
                address: document.getElementById('address').value,
                gender: document.getElementById('gender').value,
                phone: document.getElementById('phone').value
            };

            try {
                const { data, error } = await _supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: { data: metaData }
                });
                if (error) throw error;
                alert('Registration Successful! \n\nPlease check your email to activate your account.');
                regForm.reset();
                window.location.href = 'login.html';
            } catch (error) {
                alert('Registration Failed: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                submitBtn.innerHTML = '<i class="ph-bold ph-paper-plane-right text-xl"></i> Submit Registration';
                loadingText.classList.add('hidden');
            }
        });
    </script>

</body>

</html>
