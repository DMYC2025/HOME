<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>DMYSC - Quick Links</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: { green: '#16a34a', dark: '#020617' } }, fontFamily: { poppins: ['Poppins', 'sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .input-glass { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0) !important; }
        .sidebar-closed { transform: translateX(-100%); }
        @media (min-width: 768px) { .sidebar-closed { transform: translateX(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0b1121] text-slate-100 min-h-screen font-poppins overflow-hidden">

    <div class="flex h-screen relative">
        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/80 z-40 hidden md:hidden backdrop-blur-sm"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-slate-900 border-r border-slate-800 flex flex-col z-50 sidebar-closed md:relative md:translate-x-0 shadow-2xl md:shadow-none">
             <div class="p-6 flex items-center justify-between border-b border-slate-800 h-24">
                <div class="flex items-center gap-3">
                    <img src="logo.png" class="h-10 w-10 object-contain">
                    <div><h2 class="font-black text-lg text-white">ADMIN</h2><p class="text-[10px] text-brand-green font-bold">Control Panel</p></div>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden text-slate-400"><i class="ph-bold ph-x text-xl"></i></button>
            </div>
            <nav class="flex-1 p-4 space-y-2 mt-4 overflow-y-auto">
                <a href="admin_login_dashboard.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-squares-four text-xl"></i> Dashboard</a>
                <a href="member_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-users text-xl"></i> Member Manage</a>
                <a href="event_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-calendar-plus text-xl"></i> Event Manage</a>
                <a href="sport_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-trophy text-xl"></i> Sport Manage</a>
                <a href="notifycation_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-bell-ringing text-xl"></i> Notifications</a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 bg-brand-green text-white shadow-lg shadow-brand-green/20 rounded-xl font-bold"><i class="ph-bold ph-link text-xl"></i> Quick Links</a>
                <a href="excicetive_comitee_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-users-three text-xl"></i> Committee</a>
                <a href="about_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-info text-xl"></i> About Info</a>
                <a href="page_settings_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-gear text-xl"></i> Page Settings</a>
            </nav>
            <div class="p-4 border-t border-slate-800 bg-slate-900/50">
                <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white rounded-xl transition duration-300 border border-red-500/20 font-bold shadow-sm"><i class="ph-bold ph-sign-out"></i> Logout</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto relative bg-[#0b1121] custom-scrollbar">
            
            <button onclick="toggleSidebar()" class="md:hidden absolute top-6 right-6 z-40 bg-slate-800 backdrop-blur-md p-2 rounded-lg text-white border border-white/10 shadow-lg"><i class="ph-bold ph-list text-2xl"></i></button>

            <div class="relative h-80 shrink-0 overflow-hidden bg-slate-900">
                <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072')] bg-cover bg-center opacity-30"></div>
                <div class="absolute inset-0 bg-gradient-to-r from-[#0b1121] via-slate-900/90 to-transparent"></div>
                <div class="absolute inset-0 bg-gradient-to-t from-[#0b1121] via-transparent to-transparent"></div>
                
                <div class="absolute bottom-24 left-6 md:left-12 z-10" data-aos="fade-right">
                    <h1 class="text-3xl md:text-5xl font-black text-white flex items-center gap-3 drop-shadow-lg">
                        <i class="ph-duotone ph-link"></i> Quick Links
                    </h1>
                    <p class="text-teal-200 text-sm font-bold mt-2 opacity-90 tracking-wide uppercase">Manage External Resources</p>
                </div>
            </div>

            <div class="max-w-7xl mx-auto px-6 md:px-12 -mt-20 relative z-10 pb-12">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    
                    <div class="lg:col-span-1">
                        <div class="glass-panel p-6 rounded-[2rem] shadow-xl sticky top-8" data-aos="fade-up">
                            <h3 class="text-xl font-bold mb-6 flex items-center gap-2 text-white">
                                <span class="bg-teal-500/10 text-teal-500 p-2 rounded-lg"><i class="ph-bold ph-plus"></i></span> New Link
                            </h3>
                            <form id="linkForm" class="space-y-4">
                                <div><label class="text-xs font-bold uppercase text-slate-500">Title</label><input type="text" id="title" class="w-full input-glass rounded-xl p-3" required></div>
                                <div><label class="text-xs font-bold uppercase text-slate-500">URL</label><input type="text" id="url" class="w-full input-glass rounded-xl p-3" required></div>
                                <div><label class="text-xs font-bold uppercase text-slate-500">Icon URL</label><input type="text" id="img" class="w-full input-glass rounded-xl p-3"></div>
                                <div>
                                    <label class="text-xs font-bold uppercase text-slate-500">Display Type</label>
                                    <select id="type" class="w-full input-glass rounded-xl p-3 bg-slate-900" onchange="toggleDates()">
                                        <option value="always">Always Show</option>
                                        <option value="scheduled">Scheduled</option>
                                    </select>
                                </div>
                                <div id="dates" class="hidden space-y-2 border-l-2 border-teal-500 pl-3">
                                    <div><label class="text-[10px] font-bold uppercase text-slate-500">Start</label><input type="date" id="start" class="w-full input-glass rounded-xl p-3 text-slate-300"></div>
                                    <div><label class="text-[10px] font-bold uppercase text-slate-500">End</label><input type="date" id="end" class="w-full input-glass rounded-xl p-3 text-slate-300"></div>
                                </div>
                                <button type="submit" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-bold py-3.5 rounded-xl shadow-lg transition">Add Link</button>
                            </form>
                        </div>
                    </div>

                    <div class="lg:col-span-2">
                        <div class="glass-panel p-6 rounded-[2rem] shadow-xl" data-aos="fade-up" data-aos-delay="100">
                            <h3 class="text-sm font-bold text-slate-400 uppercase mb-4 tracking-widest">Current Links</h3>
                            <div id="linkList" class="space-y-3"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/supabase.js"></script>
    <script>
        AOS.init();
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('sidebar-closed');
            sidebar.classList.toggle('sidebar-open');
            overlay.classList.toggle('hidden');
        }

        async function logout() {
            if(confirm("Logout?")) {
                await _supabase.auth.signOut();
                window.location.href = 'login.html';
            }
        }

        function toggleDates() { document.getElementById('dates').classList.toggle('hidden', document.getElementById('type').value === 'always'); }

        async function loadLinks() {
            const { data } = await _supabase.from('quick_links').select('*');
            document.getElementById('linkList').innerHTML = data.map(l => `
                <div class="bg-slate-800 p-4 rounded-xl flex justify-between items-center border border-slate-700 shadow-sm">
                    <div class="flex items-center gap-4">
                        ${l.image_url ? `<img src="${l.image_url}" class="w-12 h-12 rounded-lg object-cover">` : '<div class="w-12 h-12 rounded-lg bg-slate-700 flex items-center justify-center"><i class="ph-bold ph-link text-xl text-slate-400"></i></div>'}
                        <div>
                            <h4 class="font-bold text-white">${l.title}</h4>
                            <p class="text-xs text-teal-500 font-mono truncate w-48 md:w-64">${l.url}</p>
                            ${l.display_type === 'scheduled' ? `<span class="text-[10px] bg-orange-100 text-orange-600 px-2 rounded-full font-bold">Scheduled</span>` : ''}
                        </div>
                    </div>
                    <button onclick="delLink('${l.id}')" class="text-red-400 hover:bg-red-900/20 p-2 rounded-lg"><i class="ph-bold ph-trash text-lg"></i></button>
                </div>`).join('');
        }

        document.getElementById('linkForm').addEventListener('submit', async(e)=>{
            e.preventDefault();
            await _supabase.from('quick_links').insert({
                title: document.getElementById('title').value,
                url: document.getElementById('url').value,
                image_url: document.getElementById('img').value,
                display_type: document.getElementById('type').value,
                start_date: document.getElementById('type').value === 'scheduled' ? document.getElementById('start').value : null,
                end_date: document.getElementById('type').value === 'scheduled' ? document.getElementById('end').value : null
            });
            e.target.reset(); loadLinks();
        });

        async function delLink(id) { if(confirm("Delete?")) { await _supabase.from('quick_links').delete().eq('id',id); loadLinks(); } }
        loadLinks();
    </script>
</body>
</html>
