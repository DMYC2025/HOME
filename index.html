<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Makers Youth & Sports Club</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    colors: { 
                        brand: {
                            green: '#16a34a', // Primary Green
                            dark: '#0b1121',  // Deep Black (Matches Dashboard)
                            ash: '#94a3b8',   // Ash Gray
                            light: '#f8fafc', 
                            accent: '#22c55e' 
                        }
                    },
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif']
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                } 
            } 
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; }
        .glass-header { 
            background: rgba(11, 17, 33, 0.7); 
            backdrop-filter: blur(16px); 
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        /* Slideshow Transition Styles */
        .slide-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            filter: blur(1px); /* Blur effect */
            transform: scale(1.05); /* Slight zoom to hide blur edges */
        }
        .slide-bg.active {
            opacity: 1; /* වෙනස් කරන ලදි: පින්තූර වඩාත් හොඳින් පෙනෙන ලෙස 0.3 සිට 0.6 දක්වා වැඩි කරන ලදි */
        }
    </style>
</head>
<body class="bg-brand-dark text-slate-100 selection:bg-brand-green selection:text-white overflow-x-hidden">

    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[600px] h-[600px] bg-brand-green/20 rounded-full blur-[120px] animate-pulse-slow"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] bg-blue-600/10 rounded-full blur-[120px] animate-pulse-slow"></div>
    </div>

    <nav class="fixed top-0 w-full z-50 glass-header transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-24">
                <div class="flex items-center gap-4">
                    <div class="relative w-12 h-12">
                        <div class="absolute inset-0 bg-brand-green/30 rounded-full blur-md animate-pulse"></div>
                        <img src="logo.png" alt="DMYSC Logo" class="h-12 w-12 object-contain relative z-10 drop-shadow-[0_0_10px_rgba(22,163,74,0.5)]">
                    </div>
                    <div>
                        <h1 class="font-black text-lg md:text-xl leading-none tracking-tight text-white uppercase">Dream Makers</h1>
                        <p class="text-[10px] font-bold text-brand-green uppercase tracking-[0.2em] mt-0.5">Youth & Sports Club</p>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <a href="login.html" class="hidden md:flex items-center gap-2 px-6 py-2 rounded-full bg-slate-800/50 border border-white/10 hover:border-brand-green hover:bg-brand-green/10 text-sm font-bold transition-all duration-300 group">
                        <i class="ph-bold ph-sign-in text-brand-green group-hover:text-white transition"></i>
                        <span>Member Login</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="relative min-h-screen flex items-center justify-center pt-20">
        
        <div id="hero-slideshow" class="absolute inset-0 overflow-hidden -z-10">
            <div class="slide-bg active" style="background-image: url('https://img.freepik.com/free-vector/modern-abstract-dark-violate-pink-background_84443-2788.jpg');"></div>
        </div>

        <div class="absolute inset-0 bg-gradient-to-t from-brand-dark via-brand-dark/80 to-brand-dark/40 -z-10"></div>
        
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10 -z-10"></div>

        <div class="container mx-auto px-4 text-center relative z-20">
            
            <div class="inline-flex items-center gap-2 px-5 py-2 rounded-full bg-brand-green/10 backdrop-blur-md border border-brand-green/30 text-brand-green font-bold text-xs mb-8 shadow-[0_0_20px_rgba(22,163,74,0.3)] animate-float" data-aos="fade-down">
                <i class="ph-fill ph-trophy text-yellow-400 text-lg"></i> <span class="tracking-widest uppercase">Pride of Dikhenagama</span>
            </div>

            <h1 class="text-5xl md:text-7xl lg:text-9xl font-black mb-6 leading-tight drop-shadow-2xl tracking-tighter" data-aos="zoom-in" data-aos-duration="1000">
                <span class="text-white block md:inline">DREAM</span>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-green via-emerald-400 to-green-300">MAKERS</span>
            </h1>

            <p class="text-lg md:text-xl text-slate-400 max-w-2xl mx-auto mb-12 leading-relaxed font-light" data-aos="fade-up" data-aos-delay="200">
                Empowering the next generation to conquer the future. 
                <span class="text-brand-green font-medium">Sports</span>, <span class="text-blue-400 font-medium">Education</span>, and <span class="text-purple-400 font-medium">Leadership</span> under one roof.
            </p>

            <div class="flex flex-col sm:flex-row gap-6 justify-center items-center" data-aos="fade-up" data-aos-delay="400">
                <a href="login.html" class="group relative px-10 py-5 bg-gradient-to-r from-brand-green to-emerald-700 text-white rounded-2xl font-black uppercase tracking-wide shadow-[0_0_30px_rgba(22,163,74,0.4)] hover:shadow-[0_0_50px_rgba(22,163,74,0.6)] transition-all duration-300 transform hover:-translate-y-1 w-full sm:w-auto flex items-center justify-center gap-3 overflow-hidden border border-brand-green/50">
                    <div class="absolute inset-0 bg-white/20 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700 ease-out skew-x-12"></div>
                    <i class="ph-bold ph-sign-in text-2xl group-hover:rotate-12 transition-transform duration-300"></i> 
                    <span class="relative z-10">Login Access</span>
                </a>
                
                <a href="reg.html" class="group relative px-10 py-5 bg-slate-800/40 backdrop-blur-xl border border-white/10 text-white rounded-2xl font-black uppercase tracking-wide hover:bg-slate-800/60 hover:border-brand-green/50 hover:text-brand-green transition-all duration-300 transform hover:-translate-y-1 w-full sm:w-auto flex items-center justify-center gap-3 shadow-lg overflow-hidden">
                    <i class="ph-bold ph-user-plus text-2xl group-hover:scale-110 transition-transform duration-300 relative z-10"></i> 
                    <span class="relative z-10">Join Member</span>
                </a>
            </div>
            
            <div class="mt-20 grid grid-cols-2 md:grid-cols-4 gap-8 max-w-4xl mx-auto border-t border-white/5 pt-10" data-aos="fade-up" data-aos-delay="600">
                <div class="text-center group hover:scale-105 transition duration-300">
                    <h3 id="statMembers" class="text-3xl font-black text-white group-hover:text-brand-green transition">...</h3>
                    <p class="text-xs text-slate-500 uppercase tracking-widest font-bold mt-1">Members</p>
                </div>
                <div class="text-center group hover:scale-105 transition duration-300">
                    <h3 id="statEvents" class="text-3xl font-black text-white group-hover:text-blue-400 transition">...</h3>
                    <p class="text-xs text-slate-500 uppercase tracking-widest font-bold mt-1">Events</p>
                </div>
                <div class="text-center group hover:scale-105 transition duration-300">
                    <h3 id="statSports" class="text-3xl font-black text-white group-hover:text-purple-400 transition">...</h3>
                    <p class="text-xs text-slate-500 uppercase tracking-widest font-bold mt-1">Sports Teams</p>
                </div>
                <div class="text-center group hover:scale-105 transition duration-300">
                    <h3 class="text-3xl font-black text-white group-hover:text-yellow-400 transition">100%</h3>
                    <p class="text-xs text-slate-500 uppercase tracking-widest font-bold mt-1">Unity</p>
                </div>
            </div>
        </div>
    </main>

    <div id="global-footer-placeholder"></div>
    <script src="js/footer-loader.js"></script>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, duration: 800 });
        document.documentElement.classList.add('dark');

        const supabaseUrl = 'https://tnrqasiiywcvtwkwytqe.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRucnFhc2lpeXdjdnR3a3d5dHFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjczNDIxMTEsImV4cCI6MjA4MjkxODExMX0.rd9aKmLa687zMxg8FV5AllgnYkz7wpdXBRi3a5NyXc4';
        const _supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // --- Slideshow Logic ---
        async function initSlideshow() {
            try {
                // 1. Fetch Slides from DB
                const { data: slides, error } = await _supabase
                    .from('hero_slides')
                    .select('image_url')
                    .order('order_index', { ascending: true });

                const container = document.getElementById('hero-slideshow');

                if (!error && slides && slides.length > 0) {
                    // Create slide elements
                    container.innerHTML = slides.map((slide, index) => 
                        `<div class="slide-bg ${index === 0 ? 'active' : ''}" style="background-image: url('${slide.image_url}')"></div>`
                    ).join('');

                    // Start Loop if more than 1 slide
                    if (slides.length > 1) {
                        let currentIndex = 0;
                        const slideElements = document.querySelectorAll('.slide-bg');

                        setInterval(() => {
                            // Remove active from current
                            slideElements[currentIndex].classList.remove('active');
                            
                            // Calculate next
                            currentIndex = (currentIndex + 1) % slideElements.length;
                            
                            // Add active to next
                            slideElements[currentIndex].classList.add('active');
                        }, 5000); // 5 Seconds
                    }
                }
            } catch (err) {
                console.error("Slideshow Error:", err);
            }
        }
        
        // --- Stats & Footer Data ---
        async function loadStats() {
            try {
                const { count: membersCount } = await _supabase.from('profiles').select('*', { count: 'exact', head: true });
                document.getElementById('statMembers').innerText = (membersCount || 500) + '+';

                const { count: eventsCount } = await _supabase.from('events').select('*', { count: 'exact', head: true });
                document.getElementById('statEvents').innerText = (eventsCount || 20) + '+';

                const { count: sportsCount } = await _supabase.from('sports').select('*', { count: 'exact', head: true });
                document.getElementById('statSports').innerText = (sportsCount || 5);
            } catch (err) { console.error(err); }
        }

        // Footer එක load වූ පසු දත්ත පිරවීමට උත්සාහ කරයි
        async function loadFooterData() {
            try {
                const { data } = await _supabase.from('site_settings').select('address, phone, email').eq('id', 1).single();
                if (data) {
                    // Footer එක load වීමට සුළු වේලාවක් ගත විය හැකි නිසා අපි element එක තිබේදැයි බලමු
                    const checkFooter = setInterval(() => {
                        const addrEl = document.getElementById('footerAddress');
                        if (addrEl) {
                            clearInterval(checkFooter); // Element එක හමු වූ විට නවතන්න
                            addrEl.textContent = data.address || 'Dikhenagama, Munagama';
                            document.getElementById('footerPhone').textContent = data.phone || '+94 71 615 5666';
                            document.getElementById('footerEmail').textContent = data.email || 'info@dmysc.lk';
                            
                            // වර්ෂය යාවත්කාලීන කිරීම (Footer එකේ තිබේ නම්)
                            const yearEl = document.getElementById('year');
                            if(yearEl) yearEl.innerText = new Date().getFullYear();
                        }
                    }, 100); // සෑම මිලි තත්පර 100කට වරක් පරීක්ෂා කරයි
                    
                    // තත්පර 5කින් පසුත් හමු නොවුණොත් නවතන්න (Safety timeout)
                    setTimeout(() => clearInterval(checkFooter), 5000);
                }
            } catch (err) { console.error(err); }
        }

        initSlideshow();
        loadStats();
        loadFooterData();
    </script>
</body>
</html>
