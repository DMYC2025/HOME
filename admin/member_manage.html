<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMYSC - Member Management</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: { green: '#16a34a', dark: '#020617' } }, fontFamily: { poppins: ['Poppins', 'sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .input-glass { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0) !important; }
        .sidebar-closed { transform: translateX(-100%); }
        @media (min-width: 768px) { .sidebar-closed { transform: translateX(0); } }
        
        /* Custom Scrollbar for Dark Mode */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0b1121] text-slate-100 min-h-screen font-poppins overflow-hidden">

    <div class="flex h-screen relative">
        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/80 z-40 hidden md:hidden backdrop-blur-sm"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-slate-900 border-r border-slate-800 flex flex-col z-50 sidebar-closed md:relative md:translate-x-0 shadow-2xl md:shadow-none">
             <div class="p-6 flex items-center justify-between border-b border-slate-800 h-24">
                <div class="flex items-center gap-3">
                    <img src="logo.png" class="h-10 w-10 object-contain">
                    <div><h2 class="font-black text-lg text-white">ADMIN</h2><p class="text-[10px] text-brand-green font-bold">Control Panel</p></div>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden text-slate-400"><i class="ph-bold ph-x text-xl"></i></button>
            </div>
            <nav class="flex-1 p-4 space-y-2 mt-4 overflow-y-auto">
                <a href="admin_login_dashboard.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-squares-four text-xl"></i> Dashboard</a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 bg-brand-green text-white shadow-lg shadow-brand-green/20 rounded-xl font-bold"><i class="ph-bold ph-users text-xl"></i> Member Manage</a>
                <a href="event_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-calendar-plus text-xl"></i> Event Manage</a>
                <a href="sport_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-trophy text-xl"></i> Sport Manage</a>
                <a href="notifycation_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-bell-ringing text-xl"></i> Notifications</a>
                <a href="quick_links_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-link text-xl"></i> Quick Links</a>
                <a href="excicetive_comitee_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-users-three text-xl"></i> Committee</a>
                <a href="about_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-info text-xl"></i> About Info</a>
                <a href="page_settings_manage.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition font-medium"><i class="ph-bold ph-gear text-xl"></i> Page Settings</a>
            </nav>
            <div class="p-4 border-t border-slate-800 bg-slate-900/50">
                <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white rounded-xl transition duration-300 border border-red-500/20 font-bold shadow-sm"><i class="ph-bold ph-sign-out"></i> Logout</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto relative bg-[#0b1121]">
            <button onclick="toggleSidebar()" class="md:hidden absolute top-6 right-6 z-40 bg-slate-800 backdrop-blur-md p-2 rounded-lg text-white border border-white/10 shadow-lg"><i class="ph-bold ph-list text-2xl"></i></button>

            <div class="relative h-80 shrink-0 overflow-hidden bg-slate-900">
                <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1522071820081-009f0129c71c?q=80&w=2070')] bg-cover bg-center opacity-30"></div>
                <div class="absolute inset-0 bg-gradient-to-r from-[#0b1121] via-slate-900/90 to-transparent"></div>
                <div class="absolute inset-0 bg-gradient-to-t from-[#0b1121] via-transparent to-transparent"></div>
                
                <div class="absolute bottom-24 left-6 md:left-12 z-10" data-aos="fade-right">
                    <h1 class="text-3xl md:text-5xl font-black text-white flex items-center gap-3 drop-shadow-lg">
                        <i class="ph-duotone ph-users-three"></i> Member Management
                    </h1>
                    <p class="text-green-200 text-sm font-bold mt-2 opacity-90 tracking-wide uppercase">Approve & Manage Members</p>
                </div>
            </div>

            <div class="max-w-7xl mx-auto px-4 lg:px-8 -mt-20 relative z-10 pb-12">
                <div class="glass-panel p-4 rounded-2xl mb-6 flex flex-col md:flex-row gap-4 items-center justify-between shadow-lg" data-aos="fade-up">
                    <div class="relative w-full md:w-96">
                        <i class="ph-bold ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="searchInput" onkeyup="filterMembers()" placeholder="Search members..." class="w-full pl-10 pr-4 py-2.5 rounded-xl input-glass text-sm font-medium transition focus:ring-2 focus:ring-brand-green/50 placeholder-slate-500">
                    </div>
                    <div class="flex gap-2 w-full md:w-auto">
                        <span class="flex-1 text-center bg-slate-800 px-4 py-2 rounded-xl text-xs font-bold text-slate-400 shadow-sm border border-slate-700">Total: <span id="totalCount" class="text-brand-green">0</span></span>
                        <span class="flex-1 text-center bg-slate-800 px-4 py-2 rounded-xl text-xs font-bold text-slate-400 shadow-sm border border-slate-700">Pending: <span id="pendingCount" class="text-orange-500">0</span></span>
                    </div>
                </div>

                <div class="bg-slate-900 rounded-[2rem] shadow-xl border border-slate-800 overflow-hidden" data-aos="fade-up" data-aos-delay="100">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[800px]">
                            <thead>
                                <tr class="bg-slate-800/50 border-b border-slate-800 text-xs uppercase tracking-wider text-slate-400">
                                    <th class="p-6 font-bold">Member</th>
                                    <th class="p-6 font-bold">Contact</th>
                                    <th class="p-6 font-bold">Status</th>
                                    <th class="p-6 font-bold text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="membersTable" class="text-sm font-medium divide-y divide-slate-800 text-slate-300">
                                <tr><td colspan="4" class="p-10 text-center"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-green mx-auto"></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="editModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-lg p-4">
             <div class="bg-slate-900 rounded-[2rem] shadow-2xl border border-slate-700 overflow-hidden">
                <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-800/50">
                    <h3 class="text-lg font-bold text-white flex items-center gap-2"><i class="ph-duotone ph-pencil-simple text-brand-green"></i> Edit Member</h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 transition"><i class="ph-bold ph-x text-xl"></i></button>
                </div>
                <form id="editForm" class="p-6 space-y-4">
                    <input type="hidden" id="editId">
                    <div><label class="text-xs font-bold uppercase text-slate-500">Full Name</label><input type="text" id="editName" class="w-full input-glass rounded-xl p-3"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-xs font-bold uppercase text-slate-500">NIC</label><input type="text" id="editNic" class="w-full input-glass rounded-xl p-3"></div>
                        <div><label class="text-xs font-bold uppercase text-slate-500">Phone</label><input type="text" id="editPhone" class="w-full input-glass rounded-xl p-3"></div>
                    </div>
                    <div><label class="text-xs font-bold uppercase text-slate-500">Job</label><input type="text" id="editJob" class="w-full input-glass rounded-xl p-3"></div>
                    <button type="submit" class="w-full bg-brand-green text-white py-3 rounded-xl font-bold mt-2 hover:bg-green-600 transition">Save Changes</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/supabase.js"></script>
    <script>
        AOS.init();
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('sidebar-closed');
            sidebar.classList.toggle('sidebar-open');
            overlay.classList.toggle('hidden');
        }

        async function logout() {
            if(confirm("Logout?")) {
                await _supabase.auth.signOut();
                window.location.href = 'login.html';
            }
        }

        let allMembers = [];

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return window.location.href = 'login.html';
            fetchMembers();
        }

        async function fetchMembers() {
            const { data, error } = await _supabase.from('profiles').select('*').eq('role', 'member').order('created_at', { ascending: false });
            if (!error) {
                allMembers = data;
                renderMembers(data);
                updateStats();
            }
        }

        function renderMembers(members) {
            const tbody = document.getElementById('membersTable');
            tbody.innerHTML = '';
            members.forEach(m => {
                const isApproved = m.is_approved;
                const badge = isApproved 
                    ? `<span class="bg-green-900/30 text-green-400 px-3 py-1 rounded-lg text-xs font-bold flex w-fit gap-1"><i class="ph-fill ph-check-circle"></i> Active</span>`
                    : `<span class="bg-orange-900/30 text-orange-400 px-3 py-1 rounded-lg text-xs font-bold flex w-fit gap-1 animate-pulse"><i class="ph-fill ph-clock"></i> Pending</span>`;

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-800/50 transition duration-200">
                        <td class="p-6">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center font-bold text-white">${m.full_name.charAt(0)}</div>
                                <div><div class="font-bold text-white">${m.full_name}</div><div class="text-xs text-slate-400 font-mono">${m.member_id || 'No ID'}</div></div>
                            </div>
                        </td>
                        <td class="p-6"><div class="text-xs space-y-1"><div><i class="ph-bold ph-phone text-brand-green"></i> ${m.phone||'N/A'}</div><div><i class="ph-bold ph-identification-card text-blue-500"></i> ${m.nic||'N/A'}</div></div></td>
                        <td class="p-6">${badge}</td>
                        <td class="p-6 text-right">
                             <div class="flex items-center justify-end gap-2">
                                <button onclick="toggleStatus('${m.id}', ${!isApproved})" class="p-2 rounded-lg text-brand-green hover:bg-green-900/30"><i class="ph-bold ${isApproved ? 'ph-prohibit text-orange-500' : 'ph-check'} text-lg"></i></button>
                                <button onclick="openEditModal('${m.id}')" class="p-2 rounded-lg text-blue-500 hover:bg-blue-900/30"><i class="ph-bold ph-pencil-simple text-lg"></i></button>
                                <button onclick="deleteMember('${m.id}')" class="p-2 rounded-lg text-red-500 hover:bg-red-900/30"><i class="ph-bold ph-trash text-lg"></i></button>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        function filterMembers() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderMembers(allMembers.filter(m => m.full_name.toLowerCase().includes(q) || (m.nic && m.nic.includes(q))));
        }

        function updateStats() {
            document.getElementById('totalCount').innerText = allMembers.length;
            document.getElementById('pendingCount').innerText = allMembers.filter(m => !m.is_approved).length;
        }

        async function toggleStatus(id, status) {
            if(confirm("Change Status?")) {
                await _supabase.from('profiles').update({ is_approved: status }).eq('id', id);
                fetchMembers();
            }
        }
        
        async function deleteMember(id) {
            if(confirm("Delete Member?")) {
                await _supabase.from('profiles').delete().eq('id', id);
                fetchMembers();
            }
        }

        function openEditModal(id) {
            const m = allMembers.find(x => x.id === id);
            if(m) {
                document.getElementById('editId').value = id;
                document.getElementById('editName').value = m.full_name;
                document.getElementById('editNic').value = m.nic;
                document.getElementById('editPhone').value = m.phone;
                document.getElementById('editJob').value = m.job;
                document.getElementById('editModal').classList.remove('hidden');
            }
        }
        function closeModal() { document.getElementById('editModal').classList.add('hidden'); }
        
        document.getElementById('editForm').addEventListener('submit', async(e) => {
            e.preventDefault();
            const updates = {
                full_name: document.getElementById('editName').value,
                nic: document.getElementById('editNic').value,
                phone: document.getElementById('editPhone').value,
                job: document.getElementById('editJob').value
            };
            await _supabase.from('profiles').update(updates).eq('id', document.getElementById('editId').value);
            closeModal(); fetchMembers();
        });

        init();
    </script>
</body>
</html>
