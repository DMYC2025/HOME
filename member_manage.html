    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/supabase.js"></script>
    <script>
        AOS.init();
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('sidebar-closed');
            sidebar.classList.toggle('sidebar-open');
            overlay.classList.toggle('hidden');
        }

        async function logout() {
            if(confirm("Are you sure you want to logout?")) {
                await _supabase.auth.signOut();
                window.location.href = 'login.html';
            }
        }

        let allProfiles = [];
        let currentTab = 'total'; // 'admins', 'total', 'pending', 'active'

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return window.location.href = 'login.html';
            fetchMembers();
        }

        async function fetchMembers() {
            // Fetch ALL profiles (Admins + Members)
            const { data, error } = await _supabase
                .from('profiles')
                .select('*')
                .order('created_at', { ascending: false });

            if (!error) {
                allProfiles = data;
                updateTabCounts();
                runFilters(); 
            } else {
                console.error("Fetch Error:", error);
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            
            // UI Update
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            runFilters();
        }

        function updateTabCounts() {
            // Separate counts
            const admins = allProfiles.filter(m => m.role === 'admin').length;
            const members = allProfiles.filter(m => m.role === 'member');
            
            const totalMembers = members.length;
            const pending = members.filter(m => !m.is_approved).length;
            const active = members.filter(m => m.is_approved).length;

            document.getElementById('count-admins').innerText = admins;
            document.getElementById('count-total').innerText = totalMembers;
            document.getElementById('count-pending').innerText = pending;
            document.getElementById('count-active').innerText = active;
        }

        function calculateAge(dobString) {
            if (!dobString) return 'N/A';
            const dob = new Date(dobString);
            const diff_ms = Date.now() - dob.getTime();
            const age_dt = new Date(diff_ms); 
            return Math.abs(age_dt.getUTCFullYear() - 1970);
        }

        function runFilters() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const sortVal = document.getElementById('sortSelect').value;

            // 1. Tab Filter Logic
            let filtered = [];

            if (currentTab === 'admins') {
                // Show ONLY Admins
                filtered = allProfiles.filter(m => m.role === 'admin');
            } else {
                // Show ONLY Members (exclude admins from Total/Pending/Active tabs)
                const onlyMembers = allProfiles.filter(m => m.role === 'member');
                
                if (currentTab === 'total') {
                    filtered = onlyMembers;
                } else if (currentTab === 'pending') {
                    filtered = onlyMembers.filter(m => !m.is_approved);
                } else if (currentTab === 'active') {
                    filtered = onlyMembers.filter(m => m.is_approved);
                }
            }

            // 2. Search Filter
            filtered = filtered.filter(m => 
                (m.full_name && m.full_name.toLowerCase().includes(q)) || 
                (m.nic && m.nic.toLowerCase().includes(q))
            );

            // 3. Sort Logic
            filtered.sort((a, b) => {
                if (sortVal === 'newest') {
                    return new Date(b.created_at) - new Date(a.created_at);
                } else if (sortVal === 'name_asc') {
                    return a.full_name.localeCompare(b.full_name);
                } else if (sortVal === 'age_young') {
                    const dateA = a.dob ? new Date(a.dob) : new Date(0);
                    const dateB = b.dob ? new Date(b.dob) : new Date(0);
                    return dateB - dateA; 
                } else if (sortVal === 'age_old') {
                    const dateA = a.dob ? new Date(a.dob) : new Date();
                    const dateB = b.dob ? new Date(b.dob) : new Date();
                    return dateA - dateB;
                }
                return 0;
            });

            renderMembers(filtered);
        }

        function renderMembers(data) {
            const tbody = document.getElementById('membersTable');
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-500">No records found.</td></tr>';
                return;
            }

            data.forEach(m => {
                const isApproved = m.is_approved;
                const age = calculateAge(m.dob);
                
                // Badge Logic
                let badge = '';
                if (m.role === 'admin') {
                     badge = `<span class="bg-purple-500/10 text-purple-400 px-3 py-1 rounded-lg text-xs font-bold flex w-fit gap-1 border border-purple-500/20"><i class="ph-fill ph-shield-check"></i> Admin</span>`;
                } else {
                     badge = isApproved 
                        ? `<span class="bg-green-500/10 text-green-400 px-3 py-1 rounded-lg text-xs font-bold flex w-fit gap-1 border border-green-500/20"><i class="ph-fill ph-check-circle"></i> Active</span>`
                        : `<span class="bg-orange-500/10 text-orange-400 px-3 py-1 rounded-lg text-xs font-bold flex w-fit gap-1 animate-pulse border border-orange-500/20"><i class="ph-fill ph-clock"></i> Pending</span>`;
                }

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-800/50 transition duration-200 group">
                        <td class="p-6">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-xl bg-slate-800 flex items-center justify-center font-bold text-white shadow-inner text-lg border border-slate-700">
                                    ${m.avatar_url ? `<img src="${m.avatar_url}" class="w-full h-full rounded-xl object-cover">` : m.full_name.charAt(0)}
                                </div>
                                <div>
                                    <div class="font-bold text-white text-base">${m.full_name}</div>
                                    <div class="text-xs text-slate-400 font-mono flex items-center gap-2">
                                        <span class="bg-slate-800 px-1.5 rounded text-[10px] border border-slate-700">${m.member_id || 'No ID'}</span>
                                        <span>Age: ${age}</span>
                                    </div>
                                </div>
                            </div>
                        </td>
                        <td class="p-6">
                            <div class="text-xs space-y-1.5 text-slate-400">
                                <div class="flex items-center gap-2"><i class="ph-bold ph-phone text-brand-green"></i> ${m.phone||'-'}</div>
                                <div class="flex items-center gap-2"><i class="ph-bold ph-identification-card text-blue-500"></i> ${m.nic||'-'}</div>
                                <div class="flex items-center gap-2"><i class="ph-bold ph-briefcase text-purple-500"></i> ${m.job||'-'}</div>
                            </div>
                        </td>
                        <td class="p-6">${badge}</td>
                        <td class="p-6 text-right">
                             <div class="flex items-center justify-end gap-2 opacity-100">
                                <button onclick="toggleStatus('${m.id}', ${!isApproved})" title="${isApproved ? 'Deactivate' : 'Activate'}" class="h-10 w-10 flex items-center justify-center rounded-xl transition ${isApproved ? 'bg-orange-500/10 text-orange-500 hover:bg-orange-500 hover:text-white' : 'bg-green-500/10 text-green-500 hover:bg-green-500 hover:text-white'}">
                                    <i class="ph-bold ${isApproved ? 'ph-prohibit' : 'ph-check'} text-lg"></i>
                                </button>
                                <button onclick="openEditModal('${m.id}')" title="Edit Full Profile" class="h-10 w-10 flex items-center justify-center rounded-xl bg-blue-500/10 text-blue-500 hover:bg-blue-500 hover:text-white transition">
                                    <i class="ph-bold ph-pencil-simple text-lg"></i>
                                </button>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        async function toggleStatus(id, status) {
            if(confirm(status ? "Activate this account?" : "Deactivate this account?")) {
                const { error } = await _supabase.from('profiles').update({ is_approved: status }).eq('id', id);
                if (error) alert("Error: " + error.message);
                else fetchMembers();
            }
        }

        function openEditModal(id) {
            const m = allProfiles.find(x => x.id === id);
            if(m) {
                document.getElementById('editId').value = id;
                document.getElementById('editMemberId').value = m.member_id || '';
                document.getElementById('editEmail').value = m.email || '';
                
                document.getElementById('editName').value = m.full_name || '';
                document.getElementById('editNic').value = m.nic || '';
                document.getElementById('editDob').value = m.dob || '';
                document.getElementById('editAddress').value = m.address || '';
                document.getElementById('editPhone').value = m.phone || '';
                document.getElementById('editWhatsapp').value = m.whatsapp || '';
                document.getElementById('editGender').value = m.gender || 'Male';
                document.getElementById('editJob').value = m.job || '';
                document.getElementById('editSports').value = m.sports_skills || '';
                document.getElementById('editAesthetic').value = m.aesthetic_skills || '';
                document.getElementById('editRole').value = m.role || 'member';

                document.getElementById('editModal').classList.remove('hidden');
            }
        }
        
        function closeModal() { document.getElementById('editModal').classList.add('hidden'); }
        
        document.getElementById('editForm').addEventListener('submit', async(e) => {
            e.preventDefault();
            const updates = {
                full_name: document.getElementById('editName').value,
                nic: document.getElementById('editNic').value,
                dob: document.getElementById('editDob').value || null,
                address: document.getElementById('editAddress').value,
                phone: document.getElementById('editPhone').value,
                whatsapp: document.getElementById('editWhatsapp').value,
                gender: document.getElementById('editGender').value,
                job: document.getElementById('editJob').value,
                sports_skills: document.getElementById('editSports').value,
                aesthetic_skills: document.getElementById('editAesthetic').value,
                role: document.getElementById('editRole').value
            };

            const id = document.getElementById('editId').value;
            const { error } = await _supabase.from('profiles').update(updates).eq('id', id);

            if(error) alert("Error Updating: " + error.message);
            else {
                alert("Updated successfully!");
                closeModal(); 
                fetchMembers();
            }
        });

        init();
    </script>
</body>
</html>
